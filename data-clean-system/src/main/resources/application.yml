# Spring Boot 应用配置
spring:
  application:
    name: ai-clean-system
  
  # 数据源配置
  datasource:
    # 开发环境使用MySQL (生产环境使用达梦)
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://8.160.164.52:3306/AI_CLEAN?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&sessionVariables=transaction_isolation='READ-COMMITTED'
    username: root
    password: Mysql123456.
    # 达梦数据库配置示例:
#    driver-class-name: dm.jdbc.driver.DmDriver
#    url: jdbc:dm://121.229.145.117:5236?schema=AI_CLEAN&charset=UTF-8&timezone=Asia/Shanghai&compatibleMode=oracle
#    username: SYSDBA
#    password: Dameng123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  
  # 静态资源配置
  web:
    resources:
      static-locations: classpath:/static/,file:uploads/
  
  # 文件上传路径
  file:
    upload-dir: uploads/
    export-dir: exports/
  
  # 任务调度配置
  task:
    scheduling:
      pool:
        size: 10
  
  # 缓存配置
  cache:
    type: simple
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

# MyBatis Plus配置
mybatis-plus:
  # 实体扫描，多个package用逗号或者分号分隔
  type-aliases-package: com.aiclean.entity
  # mapper文件扫描
  mapper-locations: classpath*:/mapper/**/*.xml
  # TypeHandler扫描（达梦JDBC不支持默认枚举处理器，使用自定义String读取方式）
  type-handlers-package: com.aiclean.handler
  # 全局配置
  global-config:
    db-config:
      # 主键类型 0:数据库ID自增 1:用户输入ID 2:全局唯一ID 3:全局唯一ID数字 4:全局唯一ID字符串
      id-type: auto
      # 字段策略 0:忽略判断 1:非NULL判断 2:非空判断
      field-strategy: not_empty
      # 驼峰下划线转换
      table-underline: true
    # 刷新mapper 调试神器
    refresh: false
  # 配置控制台打印完整带参数SQL语句
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    cache-enabled: true
    default-executor-type: reuse
    default-fetch-size: 100

# 服务器配置
server:
  port: 8080
  shutdown: graceful
  servlet:
    context-path: /
    session:
      timeout: 30m
    multipart:
      location: ${java.io.tmpdir}
  connection-timeout: 30000
  tomcat:
    connection-timeout: 30000
    keep-alive-timeout: 15000
    max-keep-alive-requests: 100
    threads:
      max: 200
      min-spare: 10

# 日志配置
logging:
  level:
    com.aiclean: DEBUG
    org.springframework.web: INFO
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ai-clean.log
    max-size: 10MB
    max-history: 30

# 应用自定义配置
app:
  # 系统配置
  system:
    name: AI Clean 数据清洗系统
    version: 1.0.0
    description: 基于Java Spring Boot的数据清洗系统
    
  # 数据清洗配置
  data-cleaning:
    # 默认分类ID
    default-category-id: 1
    # 质量评分阈值（百分制，与 qualityScore 0~100 一致）
    quality-threshold: 80
    # 批量处理大小
    batch-size: 1000
    # 最大处理线程数
    max-threads: 10
    # 最大并行数
    max-parallel: 5
    # 质量评分配置（百分制，与 qualityScore 0~100 一致）
    quality-score:
      threshold-review: 60
      threshold-export: 80
      # 阈值自适应：依据整批清洗/检测评分分布动态计算 review/export 阈值（而非固定 60/80）
      adaptive: false
      # 分位数（0~100），review 取低分位、export 取高分位
      adaptive-review-percentile: 30
      adaptive-export-percentile: 70
      # 自适应阈值钳制范围，避免极端分布导致阈值失效
      adaptive-review-min: 40
      adaptive-review-max: 75
      adaptive-export-min: 65
      adaptive-export-max: 95

    # 多智能体并行清洗（Sharding Agent）：按分片并行处理，提升大文件吞吐
    sharding:
      enabled: true
      # 分片策略：HASH（按 id 均匀分片）/ CATEGORY_TREE（按一级分类分桶并行）
      strategy: CATEGORY_TREE
      # 目标并行度（分片数上限），同时作为清洗线程池核心线程数
      parallelism: 4
    # 标准库配置（main_data_category 全表比对）
    standard-library:
      # AI 检测时从全表召回的候选数量（top-K）
      candidate-top-k: 10

  # 审核工作流配置
  review-workflow:
    # 默认审核人
    default-reviewer: admin
    # 任务超时时间（小时）
    task-timeout-hours: 24
    # 自动分配任务
    auto-assign: true
    # 通知配置
    notification:
      enabled: true
      email: false
      wechat: true
      
  # 导出配置
  export:
    # 导出文件保存天数
    file-retention-days: 30
    # 最大导出记录数
    max-export-records: 100000
    # 导出线程池大小
    thread-pool-size: 5
    # 导出文件格式
    default-format: excel
    # 导出目录
    directory: ${spring.file.export-dir}
    
  # 文件上传路径
  file:
    upload-path: uploads/

  # AI 提取配置（通用 OpenAI 兼容接口，支持 DeepSeek / 通义千问兼容模式 等）
  # 启用后将"属性提取"页面可使用"AI 提取"：按每行分类编码查找标准字段表头作为目标字段，
  # 结合文件导入时指定的"属性拆分列"文本，由 AI 拆分成 JSON 键值对并入库。
  ai:
    # 是否启用 AI 提取（true/false）
    enabled: true
    # 兼容 OpenAI 的 Chat Completions 接口地址，例如：
    #   DeepSeek:  https://api.deepseek.com/v1
    #   通义千问:  http://203.83.238.245:8000/v1
    base-url: http://203.83.238.245:8000/v1
    # API 密钥（注意：密钥含 # 号，必须用引号包裹，否则 YAML 会把 # 当作注释导致密钥被截断）
    api-key: "BYeIf#SGdmufoQLhT3"
    # 模型名称，例如 deepseek-chat / qwen-plus 等
    model: Qwen2.5-7B
    # 采样温度（0~1，越低越稳定）
    temperature: 0.2
    # 最大生成 token 数
    max-tokens: 2048
    # ===== 提示词（可在此自定义）=====
    # 系统提示词：角色设定与输出约束
    system-prompt: |
      你是一个专业的数据属性提取助手。你的任务是根据用户给定的一组目标字段，从一段物料/商品的描述文本中提取对应的值。
      你必须只返回一个 JSON 对象：键为目标字段名（严格使用用户提供的字段名，不要增删或修改），值为从文本中提取到的内容字符串；
      若某字段在文本中未出现或无法确定，则其值设为空字符串 ""。
      不要输出任何解释、前缀或 Markdown 代码块，只输出纯 JSON。
    # 用户提示词模板：支持占位符 {fields}（目标字段列表，参数1）与 {fullDesc}（待拆分描述文本，参数2）
    user-prompt-template: |
      目标字段列表：
      {fields}

      待拆分的属性描述文本：
      {fullDesc}

      请按上述目标字段从描述文本中提取值，只返回 JSON 键值对。
    # ===== AI 辅助分类评分（智能分类页“启用 AI 辅助评分”时使用，替代原有规则质量评分）=====
    # 系统提示词（角色设定，简短即可，详细评分要求写在用户模板里）
    classification-system-prompt: 你是一名严谨的工业品物料数据质量审核专家，只输出要求的 JSON，不要输出其他内容。
    # 用户提示词模板：支持占位符 {materialCode}{materialName}{specification}{grade}{technicalStandard}{categoryCode}{categoryName}{categoryFullPath}{stdCategoryName}{stdCategoryFullPath}{stdDescription}{stdUnit}
    classification-score-prompt: |
      请根据以下信息，评估该物料的“分类结果”是否正确合理，并给出 0~100 的质量评分（整数）。

      【待审核物料】
      物料代码：{materialCode}
      物料名称：{materialName}
      规格：{specification}
      牌号：{grade}
      技术标准：{technicalStandard}

      【系统分类结果】
      分类编码：{categoryCode}
      分类名称：{categoryName}
      分类完整路径：{categoryFullPath}

      【标准分类库参考（main_data_category）】
      标准分类名称：{stdCategoryName}
      标准分类路径：{stdCategoryFullPath}
      标准分类说明：{stdDescription}
      计量单位：{stdUnit}

      评分要点：
      1. 分类编码/名称是否与标准分类库一致（不一致明显扣分）；
      2. 物料名称、规格、牌号是否确实属于该分类（明显错分严重扣分）；
      3. 分类路径层级是否完整合理。

      只返回一个 JSON 对象：{"score": <0-100 的整数>, "reason": "<简短中文说明>"}

    # ===== AI 辅助分类检测（基于 main_data_category 全表候选比对）=====
    # 系统提示词
    classification-detect-system-prompt: 你是一名严谨的工业品物料数据质量审核专家。你必须依据“物料自身的名称、规格、牌号、技术标准”独立判断其正确分类，不得仅凭“系统分类编码是否出现在候选列表中”就认定正确。只输出要求的 JSON，不要输出其他内容。
    # 用户提示词模板：占位符 {materialCode}{materialName}{specification}{grade}{technicalStandard}{unit}{categoryCode}{categoryName}{categoryFullPath}{fullDescription}{candidates}
    # 注：{fullDescription} 为导入时指定的"属性拆分列"原始文本，AI 打分优先依据它而非仅属性名称列
    classification-detect-prompt: |
      请审核下面这条物料的系统分类是否正确。你必须依据物料自身的名称、规格、牌号、技术标准以及"属性拆分列(全描述)"，独立判断它“真正应该属于”标准分类库中的哪一个分类，再与系统给出的分类对比。

      【待审核物料】
      物料代码：{materialCode}
      物料名称：{materialName}
      规格：{specification}
      牌号：{grade}
      技术标准：{technicalStandard}
      计量单位：{unit}
      属性拆分列（导入时指定的全描述，优先依据）：{fullDescription}

      【系统分类结果】
      分类编码：{categoryCode}
      分类名称：{categoryName}
      分类完整路径：{categoryFullPath}

      【标准分类库候选（main_data_category 全表召回，可能不完整）】
      {candidates}

      审核规则（务必遵守）：
      1. 先根据物料名称/规格/牌号/技术标准，判断它最合理的标准分类编码（即 bestMatchCode）。
      2. 若系统分类编码 {categoryCode} 不在上面的候选列表中，则系统分类【必定有误】，matched 必须为 false。
      3. 若系统分类编码 {categoryCode} 在候选列表中，仍需判断物料内容是否真的属于该分类；若明显错分，matched 为 false 并给出正确的 bestMatchCode。
      4. bestMatchCode 必须填写你判定出的“最合理标准编码”（即使系统正确，也应填系统编码本身，不要留空）；若候选中确实没有合适项，可填你认为最接近的编码。
      5. 不同物料要独立判断，禁止对多条不同物料返回相同的 bestMatchCode。

      评分：系统分类正确给 85~100；轻微偏差给 60~84；明显错分给 0~59。

      只返回一个 JSON 对象：
      {"score": <0-100 整数>, "matched": <true/false>, "bestMatchCode": "<最合理标准编码>", "reason": "<简短中文说明，含判断依据>"}

    # ===== AI 标准分类问答（基于 main_data_category 的 RAG-lite 问答）=====
    # 复用 CategoryStandardLibrary 内存索引：先按"编码/层级/关键词"从标准库检索相关分类，
    # 再把命中记录作为上下文注入系统提示词，交由大模型基于"仅限该上下文"作答（避免 text-to-SQL 风险）。
    # 系统提示词：角色设定与约束；置空则使用代码内默认提示词。
    category-system-prompt: |
      你是一名"标准分类代码查询助手"，专门基于下方提供的【标准分类库（main_data_category）】数据回答用户关于标准分类的问题。
      规则：
      1. 只能依据【标准分类库】中给出的记录作答，不得编造库中不存在的分类编码或名称。
      2. 若用户给出一段物料名称/描述并询问应归入哪个标准分类，请在库中检索最匹配的分类，给出分类编码与名称，并说明理由。
      3. 若库中确实没有相关信息，明确告知"标准分类库中未找到相关记录"，不要臆测。
      4. 回答使用简洁中文；涉及分类时附上分类编码（如 100101）与完整路径（full_path）。
      5. 可以列举、对比、解释分类的层级关系、计量单位、说明等字段。
    # 关键词检索返回的候选数量
    category-top-k: 15
    # 注入上下文的最大标准分类条数（控制 token 与成本）
    category-max-context: 40

  # 文件处理配置
  file-processing:
    # Excel解析配置
    excel:
      max-rows: 100000
      max-columns: 100
      default-sheet-index: 0
    # CSV解析配置
    csv:
      encoding: UTF-8
      delimiter: ','
      quote-char: '"'
    # 文件编码检测
    encoding-detection: true
    
  # 缓存配置
  cache:
    # 分类缓存
    category-cache-ttl: 3600
    # 数据缓存
    data-cache-ttl: 1800
    # 统计缓存
    statistics-cache-ttl: 300
    
  # 安全配置
  security:
    # JWT配置
    jwt:
      # HS256 签名密钥（长度需 >= 32 字节，生产环境请替换为更安全的随机值）
      secret: ai-clean-secret-key-2024-jwt-hs256-signing-key-please-change-in-prod
      # 过期时间（毫秒），默认 24 小时
      expiration: 86400000
    # CORS配置
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: true
      
  # 监控配置
  monitoring:
    # 性能监控
    performance:
      enabled: true
      interval-seconds: 60
    # 健康检查
    health-check:
      enabled: true
      interval-seconds: 30
    # 日志监控
    log-monitoring:
      enabled: true
      level: WARN

# Swagger配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  packages-to-scan: com.aiclean.controller
  paths-to-match: /api/**

# 开发环境配置
debug: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always