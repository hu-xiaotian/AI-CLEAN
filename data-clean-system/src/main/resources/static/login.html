<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - Data Clean 数据清洗系统</title>
<link rel="stylesheet" href="/css/style.css">
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font);
        background: radial-gradient(circle at 20% 20%, #1e3a8a 0%, #0f172a 55%, #020617 100%);
        overflow: hidden;
        position: relative;
    }

    /* 背景装饰光斑 */
    body::before,
    body::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: .5;
        z-index: 0;
    }
    body::before {
        width: 420px; height: 420px;
        background: #2563eb;
        top: -120px; left: -80px;
    }
    body::after {
        width: 360px; height: 360px;
        background: #3b82f6;
        bottom: -120px; right: -60px;
        opacity: .35;
    }

    .login-shell {
        position: relative;
        z-index: 1;
        display: flex;
        width: 880px;
        max-width: 94vw;
        min-height: 540px;
        background: var(--surface);
        border-radius: 18px;
        box-shadow: 0 30px 70px rgba(2, 6, 23, .45);
        overflow: hidden;
        animation: rise .55s cubic-bezier(.16, 1, .3, 1);
    }

    @keyframes rise {
        from { opacity: 0; transform: translateY(24px) scale(.98); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ---------- 左侧品牌区 ---------- */
    .login-aside {
        flex: 1.05;
        background: linear-gradient(155deg, #1d4ed8 0%, #2563eb 50%, #3b82f6 100%);
        color: #fff;
        padding: 46px 42px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
        overflow: hidden;
    }
    .login-aside::after {
        content: "";
        position: absolute;
        width: 260px; height: 260px;
        border: 1px solid rgba(255, 255, 255, .15);
        border-radius: 50%;
        bottom: -90px; right: -70px;
    }
    .login-aside::before {
        content: "";
        position: absolute;
        width: 160px; height: 160px;
        border: 1px solid rgba(255, 255, 255, .12);
        border-radius: 50%;
        top: -50px; left: -40px;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
        z-index: 1;
    }
    .brand-logo {
        width: 46px; height: 46px;
        border-radius: 12px;
        background: rgba(255, 255, 255, .16);
        display: flex; align-items: center; justify-content: center;
        backdrop-filter: blur(4px);
    }
    .brand-name { font-size: 20px; font-weight: 700; letter-spacing: .3px; }
    .brand-sub  { font-size: 12px; color: rgba(255, 255, 255, .75); margin-top: 2px; }

    .aside-hero { position: relative; z-index: 1; }
    .aside-hero h2 {
        font-size: 26px;
        font-weight: 700;
        line-height: 1.35;
        margin: 0 0 14px;
    }
    .aside-hero p {
        font-size: 13.5px;
        line-height: 1.7;
        color: rgba(255, 255, 255, .82);
        margin: 0 0 26px;
        max-width: 320px;
    }
    .aside-features { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }
    .aside-features li { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: rgba(255, 255, 255, .9); }
    .aside-features .tick {
        flex: 0 0 22px; width: 22px; height: 22px;
        border-radius: 50%;
        background: rgba(255, 255, 255, .18);
        display: flex; align-items: center; justify-content: center;
    }

    .aside-foot { position: relative; z-index: 1; font-size: 11.5px; color: rgba(255, 255, 255, .6); }

    /* ---------- 右侧表单区 ---------- */
    .login-main {
        flex: 1;
        padding: 54px 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    .login-head { margin-bottom: 30px; }
    .login-head h1 { font-size: 22px; font-weight: 700; color: var(--text); margin: 0 0 6px; letter-spacing: -.01em; }
    .login-head p  { font-size: 13px; color: var(--text-secondary); margin: 0; }

    .login-error {
        display: none;
        align-items: center;
        gap: 8px;
        background: var(--danger-subtle);
        color: var(--danger);
        border: 1px solid #fecaca;
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        font-size: 13px;
        margin-bottom: 18px;
    }
    .login-error.show { display: flex; animation: shake .35s; }
    @keyframes shake {
        0%,100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }

    .login-form .form-group { margin-bottom: 18px; }
    .login-form label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 7px; font-weight: 500; }

    .field { position: relative; }
    .field-icon {
        position: absolute;
        left: 13px; top: 50%;
        transform: translateY(-50%);
        color: var(--text-tertiary);
        display: flex;
        pointer-events: none;
        transition: color .15s;
    }
    .field .form-input {
        width: 100%;
        height: 46px;
        padding: 0 14px 0 40px;
        font-size: 14px;
        border-radius: var(--radius);
        background: var(--bg);
    }
    .field .form-input:focus { background: var(--surface); }
    .field:focus-within .field-icon { color: var(--accent); }

    .login-btn {
        width: 100%;
        height: 46px;
        margin-top: 10px;
        font-size: 15px;
        font-weight: 600;
        border-radius: var(--radius);
        letter-spacing: 2px;
        box-shadow: 0 6px 16px rgba(37, 99, 235, .25);
        transition: background .15s, transform .12s, box-shadow .15s;
    }
    .login-btn:hover { box-shadow: 0 8px 22px rgba(37, 99, 235, .35); }
    .login-btn:active { transform: translateY(1px); }

    .login-tip { text-align: center; font-size: 12px; color: var(--text-tertiary); margin-top: 22px; }

    /* ---------- 响应式 ---------- */
    @media (max-width: 760px) {
        .login-shell { flex-direction: column; min-height: auto; width: 94vw; }
        .login-aside { display: none; }
        .login-main { padding: 40px 28px; }
    }
</style>
</head>
<body>
<div class="login-shell">
    <!-- 左侧品牌展示 -->
    <aside class="login-aside">
        <div class="brand">
            <div class="brand-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <ellipse cx="12" cy="5" rx="8" ry="3"/>
                    <path d="M4 5v6c0 1.66 3.58 3 8 3s8-1.34 8-3V5"/>
                    <path d="M4 11v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/>
                </svg>
            </div>
            <div>
                <div class="brand-name">Data Clean</div>
                <div class="brand-sub">数据清洗系统</div>
            </div>
        </div>

        <div class="aside-hero">
            <h2>让脏数据<br>变得干净可用</h2>
            <p>一站式完成数据导入、标准化清洗与质量校验，帮助企业快速构建可信数据资产。</p>
            <ul class="aside-features">
                <li>
                    <span class="tick"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                    智能字段映射与去重
                </li>
                <li>
                    <span class="tick"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                    标准化标题库自动匹配
                </li>
                <li>
                    <span class="tick"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
                    清洗结果可视化校验
                </li>
            </ul>
        </div>

        <div class="aside-foot">© 2026 Data Clean · 内部数据治理平台</div>
    </aside>

    <!-- 右侧登录表单 -->
    <main class="login-main">
        <div class="login-head">
            <h1>欢迎登录</h1>
            <p>请输入账号信息以继续使用</p>
        </div>

        <div class="login-error" id="loginError">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="loginErrorText"></span>
        </div>

        <form class="login-form" id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="field">
                    <span class="field-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </span>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" autofocus>
                </div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <div class="field">
                    <span class="field-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码">
                </div>
            </div>
            <button type="submit" class="btn btn-primary login-btn" id="loginBtn">登 录</button>
        </form>
<!--        <p class="login-tip">默认管理员账号：admin / admin123</p>-->
    </main>
</div>

<script>
    const TOKEN_KEY = 'dc_token';
    const USER_KEY = 'dc_user';

    // 已登录则直接进入主页
    if (localStorage.getItem(TOKEN_KEY)) {
        location.replace('/index.html');
    }

    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('loginError');
    const errorText = document.getElementById('loginErrorText');
    const loginBtn = document.getElementById('loginBtn');

    function showError(msg) {
        errorText.textContent = msg;
        errorBox.classList.add('show');
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.classList.remove('show');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) {
            showError('请输入用户名和密码');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = '登录中…';
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await res.json();
            if (data.code === 200 && data.data && data.data.token) {
                localStorage.setItem(TOKEN_KEY, data.data.token);
                localStorage.setItem(USER_KEY, JSON.stringify(data.data.user || {}));
                location.replace('/index.html');
            } else {
                showError(data.msg || '登录失败');
            }
        } catch (err) {
            showError('网络异常，请稍后重试');
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = '登 录';
        }
    });
</script>
</body>
</html>
