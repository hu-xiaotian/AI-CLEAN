# Spring Boot 应用配置
spring:
  application:
    name: ai-clean-system
  
  # 数据源配置
  datasource:
    # 开发环境使用MySQL (生产环境使用达梦)
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://8.160.164.52:3306/AI_CLEAN?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
#    username: root
#    password: Mysql123456.
    # 达梦数据库配置示例:
    driver-class-name: dm.jdbc.driver.DmDriver
    url: jdbc:dm://121.229.145.117:5236?schema=AI_CLEAN&charset=UTF-8&timezone=Asia/Shanghai&compatibleMode=oracle
    username: SYSDBA
    password: Dameng123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  
  # 静态资源配置
  web:
    resources:
      static-locations: classpath:/static/,file:uploads/
  
  # 文件上传路径
  file:
    upload-dir: uploads/
    export-dir: exports/
  
  # 任务调度配置
  task:
    scheduling:
      pool:
        size: 10
  
  # 缓存配置
  cache:
    type: simple
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m

# MyBatis Plus配置
mybatis-plus:
  # 实体扫描，多个package用逗号或者分号分隔
  type-aliases-package: com.aiclean.entity
  # mapper文件扫描
  mapper-locations: classpath*:/mapper/**/*.xml
  # TypeHandler扫描（达梦JDBC不支持默认枚举处理器，使用自定义String读取方式）
  type-handlers-package: com.aiclean.handler
  # 全局配置
  global-config:
    db-config:
      # 主键类型 0:数据库ID自增 1:用户输入ID 2:全局唯一ID 3:全局唯一ID数字 4:全局唯一ID字符串
      id-type: auto
      # 字段策略 0:忽略判断 1:非NULL判断 2:非空判断
      field-strategy: not_empty
      # 驼峰下划线转换
      table-underline: true
    # 刷新mapper 调试神器
    refresh: false
  # 配置控制台打印完整带参数SQL语句
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    cache-enabled: true
    default-executor-type: reuse
    default-fetch-size: 100

# 服务器配置
server:
  port: 8080
  shutdown: graceful
  servlet:
    context-path: /
    session:
      timeout: 30m
    multipart:
      location: ${java.io.tmpdir}
  connection-timeout: 30000
  tomcat:
    connection-timeout: 30000
    keep-alive-timeout: 15000
    max-keep-alive-requests: 100
    threads:
      max: 200
      min-spare: 10

# 日志配置
logging:
  level:
    com.aiclean: DEBUG
    org.springframework.web: INFO
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ai-clean.log
    max-size: 10MB
    max-history: 30

# 应用自定义配置
app:
  # 系统配置
  system:
    name: AI Clean 数据清洗系统
    version: 1.0.0
    description: 基于Java Spring Boot的数据清洗系统
    
  # 数据清洗配置
  data-cleaning:
    # 默认分类ID
    default-category-id: 1
    # 质量评分阈值（百分制，与 qualityScore 0~100 一致）
    quality-threshold: 80
    # 批量处理大小
    batch-size: 1000
    # 最大处理线程数
    max-threads: 10
    # 最大并行数
    max-parallel: 5
    # 质量评分配置（百分制，与 qualityScore 0~100 一致）
    quality-score:
      threshold-review: 60
      threshold-export: 80
    
  # 审核工作流配置
  review-workflow:
    # 默认审核人
    default-reviewer: admin
    # 任务超时时间（小时）
    task-timeout-hours: 24
    # 自动分配任务
    auto-assign: true
    # 通知配置
    notification:
      enabled: true
      email: false
      wechat: true
      
  # 导出配置
  export:
    # 导出文件保存天数
    file-retention-days: 30
    # 最大导出记录数
    max-export-records: 100000
    # 导出线程池大小
    thread-pool-size: 5
    # 导出文件格式
    default-format: excel
    # 导出目录
    directory: ${spring.file.export-dir}
    
  # 文件上传路径
  file:
    upload-path: uploads/
    
  # 文件处理配置
  file-processing:
    # Excel解析配置
    excel:
      max-rows: 100000
      max-columns: 100
      default-sheet-index: 0
    # CSV解析配置
    csv:
      encoding: UTF-8
      delimiter: ','
      quote-char: '"'
    # 文件编码检测
    encoding-detection: true
    
  # 缓存配置
  cache:
    # 分类缓存
    category-cache-ttl: 3600
    # 数据缓存
    data-cache-ttl: 1800
    # 统计缓存
    statistics-cache-ttl: 300
    
  # 安全配置
  security:
    # JWT配置
    jwt:
      secret: ai-clean-secret-key-2024
      expiration: 86400000
    # CORS配置
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: true
      
  # 监控配置
  monitoring:
    # 性能监控
    performance:
      enabled: true
      interval-seconds: 60
    # 健康检查
    health-check:
      enabled: true
      interval-seconds: 30
    # 日志监控
    log-monitoring:
      enabled: true
      level: WARN

# Swagger配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  packages-to-scan: com.aiclean.controller
  paths-to-match: /api/**

# 开发环境配置
debug: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always